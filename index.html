<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Portfólio Dev</title>
  </head>
  <body>
    <header>
      <nav class="radioInputs">
        <label for="homeRadio" class="radio">
          <input
            type="radio"
            name="navBar"
            id="homeRadio"
            value="home"
            onclick="trocar(this.value)"
            checked
          />
          <span class="name">Inicio</span>
        </label>
        <label for="aboutRadio" class="radio"
          ><input
            type="radio"
            name="navBar"
            id="aboutRadio"
            value="about"
            onclick="trocar(this.value)"
          />
          <span class="name">Sobre</span>
        </label>
        <label for="projectsRadio" class="radio"
          ><input
            type="radio"
            name="navBar"
            id="projectsRadio"
            value="projects"
            onclick="trocar(this.value)"
          />
          <span class="name">Projetos</span>
        </label>
        <label for="contactRadio" class="radio"
          ><input
            type="radio"
            name="navBar"
            id="contactRadio"
            value="contact"
            onclick="trocar(this.value)"
          />
          <span class="name">Contato</span>
        </label>
      </nav>
    </header>
    <main>
      <!-- ______________________________________________________ -->
      <!-- ______________________________________________________ -->
      <!-- From Uiverse.io by sinful_9361 -->
      <div class="container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
        <div></div>
      </div>
      <!-- ______________________________________________________ -->
      <!-- ______________________________________________________ -->
      <section id="home" class="sections">
        <div id="divHome">
          <img
            id="fotoDev"
            src="./assets/img/Eu bolha.png"
            alt="Foto do Desenvolvedor"
          />
          <div id="textHome">
            <h1 class="title-bold">
              Desenvolvedor <span id="titleSpan">Front-End</span>
            </h1>
            <p>
              Transformo ideias em páginas rápidas e funcionais. HTML, CSS e
              JavaScript.
            </p>
          </div>
        </div>

        <img
          id="arrowDown"
          src="./assets/img/Arrow Down.png"
          alt="Arrow Down"
        />
      </section>
      <section id="about" class="sections">
        <h1>Pagina SOBRE</h1>
      </section>
      <section id="projects" class="sections">
        <div class="boxCards">
          <div class="cardsRight">
            <a
              class="linkCards"
              href="https://jore-x.github.io/DevLogin/"
              target="_blank"
            ></a>
            <img
              class="scaledIframe"
              src="./assets/img/Imagem Projetos/jore-x.github.io_DevLogin_.png"
              alt=""
            />
            <h3>
              Página de Login
              <img
                class="externalLink"
                src="./assets/img/icons8-link-externo-64.png"
                alt=""
              />
            </h3>
          </div>
          <div class="cardsRight">
            <a
              class="linkCards"
              href="https://jore-x.github.io/Hollow/"
              target="_blank"
            ></a>
            <img
              class="scaledIframe"
              src="./assets/img/Imagem Projetos/jore-x.github.io_Hollow_.png"
              alt=""
            />
            <h3>
              Wiki Hollow Knight
              <img
                class="externalLink"
                src="./assets/img/icons8-link-externo-64.png"
                alt=""
              />
            </h3>
          </div>
        </div>
        <div class="boxCards">
          <div class="cardsCenter">
            <a
              class="linkCards"
              href="https://jore-x.github.io/Landing-Page-Meias-Patinhas/"
              target="_blank"
            ></a>
            <img
              class="scaledIframe"
              src="./assets/img/Imagem Projetos/jore-x.github.io_Landing-Page-Meias-Patinhas_.png"
              alt=""
            />
            <h3>
              Meias Patinhas
              <img
                class="externalLink"
                src="./assets/img/icons8-link-externo-64.png"
                alt=""
              />
            </h3>
          </div>
          <div class="cardsCenter">
            <a
              class="linkCards"
              href="https://jore-x.github.io/Autorizada-1.0/"
              target="_blank"
            ></a>
            <img
              class="scaledIframe"
              src="./assets/img/Imagem Projetos/jore-x.github.io_Autorizada-1.0_.png"
              alt=""
            />
            <h3>
              Autorizada 1.0
              <img
                class="externalLink"
                src="./assets/img/icons8-link-externo-64.png"
                alt=""
              />
            </h3>
          </div>
        </div>
        <h1 id="h1Projects">PROJETOS</h1>
        <div class="boxCards">
          <div class="cardsLeft">
            <a
              class="linkCards"
              href="https://jore-x.github.io/CompraMestre/"
              target="_blank"
            ></a>
            <img
              class="scaledIframe"
              src="./assets/img/Imagem Projetos/jore-x.github.io_CompraMestre_.png"
              alt=""
            />
            <h3>
              Lista de Compras
              <img
                class="externalLink"
                src="./assets/img/icons8-link-externo-64.png"
                alt=""
              />
            </h3>
          </div>
          <div class="cardsLeft">
            <a
              class="linkCards"
              href="https://jore-x.github.io/Calculador_de_Juros/"
              target="_blank"
            ></a>
            <img
              class="scaledIframe"
              src="./assets/img/Imagem Projetos/jore-x.github.io_Calculador_de_Juros_.png"
              alt=""
            />
            <h3>
              Cálculo de Juros
              <img
                class="externalLink"
                src="./assets/img/icons8-link-externo-64.png"
                alt=""
              />
            </h3>
          </div>
        </div>
      </section>
      <section id="contact" class="sections">
        <h1>Pagina de contato</h1>
      </section>
    </main>
  </body>
  <script src="./script.js"></script>
</html>
